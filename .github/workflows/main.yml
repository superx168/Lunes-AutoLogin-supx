name: Lunes Auto Login

on:
  schedule:
    - cron: "0 2 */14 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup local HTTP proxy via gost
        run: |
          # Download gost
          GOST_VER=2.12.0
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${GOST_VER}/gost-linux-amd64-${GOST_VER}.tgz"
          tar xzf gost-linux-amd64-${GOST_VER}.tgz
          mv gost /usr/local/bin/gost
          chmod +x /usr/local/bin/gost
          # Start gost: local HTTP proxy -> upstream SOCKS5
          nohup gost -L http://:8888 -F socks5://${{ secrets.PROXY_URL }} > /tmp/gost.log 2>&1 &
          sleep 3
          # Test proxy
          curl -s --proxy http://127.0.0.1:8888 https://httpbin.org/ip || echo "Proxy test via gost failed"

      - name: Install deps
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run login
        env:
          ACCOUNTS_BATCH: ${{ secrets.ACCOUNTS_BATCH }}
          PROXY_URL: http://127.0.0.1:8888
        run: python login.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"

      - name: Commit timestamp
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          git diff --cached --quiet || (git commit -m "run $(date +'%Y-%m-%d %H:%M')" && git push)
